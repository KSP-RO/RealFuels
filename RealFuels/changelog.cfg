	VERSION
	{
		version = 15.14.0.0
		versionKSP = 1.12.3
		CHANGE
		{
			change = Engine Config UI
		}
		CHANGE
		{
			change = CHANGES / NEW FEATURES
			subchange = Font / Window Scaling
			subchange = Window is now 3 separate panels: Table, Simulation, Chart. The player can choose to hide or show the Simulation and Chart panels
			subchange = Settings Persistence: Scaling, window location, column selection and panel design is now saved to PluginData and will persist sessions
			subchange = Added the current DU % information to the Survivability column
			subchange = Player can choose to see times in mm:ss or in seconds
			subchange = Column Headers truncated to save space. Tooltips give the full name when the column headers are hovered
			subchange = Added color coded actions for the Switch, Active, Buy, Owned buttons
			subchange = Redesigned the Simulation area to make the information easier to use
		}
		CHANGE
		{
			change = BUG FIXES
			subchange = Does not open in the Action Groups screen
			subchange = RCS ISP values are now correct in the Chart and Bottom Section
			subchange = Window ID collided with other mods and when certain mods windows were open with the Engine Config UI, it would null ref and break the UI
			subchange = Tooltips will no longer render behind the window
			subchange = Switch / Active buttons do not change widths
		}
		CHANGE
		{
			change = Tank Window UI
		}
		CHANGE
		{
			change = CHANGES / NEW FEATURES
			subchange = Font / Window Scaling
			subchange = Added Tooltips for most of the new window parts to better explain to the player what was expected
		}
		CHANGE
		{
			change = BUG FIXES
			subchange = Does not open in the Action Groups screen
			subchange = Life Support "ADD TO TANK" no longer can overfill a tank. If the resources won't fit, a popup will tell you
			subchange = Fixed adding 2 resources back to back would not fill to the full % requested
		}
	}
